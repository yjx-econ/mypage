    <!-- Custom Polish -->
    <style>
        :root {
            --page-max-width: 1240px;
            --text-main: #202124;
            --text-muted: #5f6368;
            --surface-soft: #f7f8fa;
            --border-soft: rgba(0, 0, 0, 0.08);
            --accent: #0f4c81;

            --portrait-width: 165px;
            --portrait-overlap: 86px;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 78px;
        }

        body {
            background: #fff;
            color: var(--text-main);
            font-family:
                "Noto Sans SC",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Source Han Sans SC",
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
            font-size: 16px;
            line-height: 1.85;
            letter-spacing: 0.005em;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: var(--page-max-width);
        }

        /* =========================
           Navigation
        ========================= */

        #mainNav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-soft);
            height: 60px;
        }

        .navbar-brand {
            color: var(--accent) !important;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .nav-link {
            font-size: 1.0rem;
            font-weight: 600;

            padding-top: 0.5rem;
            padding-bottom: 0.5rem;

            letter-spacing: 0.05em;
            color: #30343b !important;
        }

        .nav-link:hover,
        .nav-link:focus {
            color: var(--accent) !important;
        }

        /* =========================
           Hero Section
        ========================= */

        .top-section {
            position: relative;
            height: 420px;
            background-size: cover;
            background-position: center;
            overflow: visible;
        }

        .top-section::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            background:
                linear-gradient(
                    90deg,
                    rgba(8, 25, 45, 0.62),
                    rgba(8, 25, 45, 0.20)
                ),
                linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.14),
                    rgba(0, 0, 0, 0.14)
                );
        }

        .top-section-content {
            position: relative;
            z-index: 5;
            height: 500px;
            display: flex;
            align-items: center;
        }

        #top-section-bg-text {
            max-width: 760px;
            font-size: clamp(2.4rem, 5vw, 4.6rem);
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
        }

        /* =========================
           Portrait at Banner/Text Boundary
        ========================= */

        .hero-portrait-layer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(-1 * var(--portrait-overlap));
            z-index: 20;
            pointer-events: none;
        }

        .hero-portrait-layer .container {
            display: flex;
            justify-content: flex-end;
        }

        .hero-portrait {
            width: var(--portrait-width);
            margin-right: clamp(0rem, 4vw, 3.5rem);
            pointer-events: auto;
        }

        .hero-portrait img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.30);
            transition:
                transform 0.25s ease,
                box-shadow 0.25s ease;
        }

        .hero-portrait img:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.34);
        }

        /* =========================
           Sections
        ========================= */

        section {
            padding-top: 4.5rem;
            padding-bottom: 4.5rem;
        }

        #home {
            padding-top: calc(4.5rem);
        }

        section header h2 {
            position: relative;
            margin-bottom: 1.8rem;
            padding-bottom: 0.65rem;
            color: #1f2933;
            font-size: clamp(1.55rem, 2.5vw, 2.05rem);
            font-weight: 750;
            letter-spacing: 0.015em;
        }

        section header h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 56px;
            height: 3px;
            border-radius: 99px;
            background: var(--accent);
        }

        .main-body {
            width: 100%;
            max-width: 960px;
            color: #262b33;
            font-size: 1.04rem;
            line-height: 1.95;
        }

        .main-body p,
        .main-body li {
            color: #2d333b;
        }

        .main-body p {
            margin-bottom: 1.05rem;
        }

        .main-body ul,
        .main-body ol {
            padding-left: 1.35rem;
            margin-bottom: 1.25rem;
        }

        .main-body li {
            margin-bottom: 0.45rem;
        }

        .main-body a {
    color: #6FA8DC;
    font-weight: 500;
}

.main-body a:hover {
    color: #4A90E2;
    text-decoration: underline;
}

        .bg-gradient-primary-to-secondary-light {
            background: #fff;
        }

        .bg-gradient-primary-to-secondary-gray {
            background: linear-gradient(180deg, #f7f8fa 0%, #f1f3f5 100%);
        }

        footer.bg-bottom {
            background: #17212b;
        }

        #copyright-text {
            letter-spacing: 0.01em;
        }
 

        /* =========================
           Mobile
        ========================= */

        @media (max-width: 575.98px) {

/* Hide portrait on mobile */

.hero-portrait-layer {
    display: none;
} 

         
             :root {
                 135px;
                --portrait-overlap: 64px;
            }

            .container,
            .container.px-5 {
                padding-left: 1.35rem 
                padding-right: 1.35rem 
            }

         .top-section { display: none; }
 
            .hero-portrait img {
                border-radius: 14px;
            }

            #home { padding-top: 6rem; }

            .main-body {
                font-size: 1rem;
                line-height: 1.9;
            }
    .navbar-brand {
        font-size: 1rem;
    }

    .nav-link {
        font-size: 0.9rem;
    }
            .nav-link {
                letter-spacing: 0.03em;
            }

         .navbar-collapse {
    background: #fff;
    padding: 1rem 0;
}
         
        }
