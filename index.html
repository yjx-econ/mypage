<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="stylesheet" href="static/css/styles.css" />
    <link rel="stylesheet" href="static/css/main.css" />
<!-- Chinese Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Final Visual & Typography Polish -->
    <style>
        :root {
            --page-max-width: 1120px;
            --text-main: #202124;
            --text-muted: #5f6368;
            --surface-light: rgba(255, 255, 255, 0.92);
            --surface-soft: #f7f8fa;
            --border-soft: rgba(0, 0, 0, 0.08);
            --accent: #1f4e79;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 78px;
        }

        body {
            background: #fff;
            color: var(--text-main);
            font-family:
                "Noto Sans SC",
                "PingFang SC",
                "Hiragino Sans GB",
                "Microsoft YaHei",
                "Source Han Sans SC",
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
            font-size: 16px;
            line-height: 1.85;
            letter-spacing: 0.005em;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: var(--page-max-width);
        }

        #mainNav {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-soft);
        }

        .navbar-brand {
            color: var(--accent) !important;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .nav-link {
            font-size: 0.92rem;
            font-weight: 650;
            letter-spacing: 0.06em;
            color: #30343b !important;
        }

        .nav-link:hover,
        .nav-link:focus {
            color: var(--accent) !important;
        }

        .top-section {
            min-height: 520px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .top-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(8, 25, 45, 0.64), rgba(8, 25, 45, 0.18)),
                linear-gradient(0deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.16));
        }

        .top-section-content {
            position: relative;
            z-index: 1;
            min-height: 520px;
            display: flex;
            align-items: center;
        }

        #top-section-bg-text {
            max-width: 760px;
            font-size: clamp(2.25rem, 5vw, 4.4rem);
            line-height: 1.08;
            letter-spacing: 0.02em;
            text-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
        }

        .user-photo {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .user-photo img {
            width: min(72%, 280px);
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 22px 55px rgba(0, 0, 0, 0.28) !important;
            background: #fff;
        }

        section {
            padding-top: 4.5rem;
            padding-bottom: 4.5rem;
        }

        section header h2 {
            position: relative;
            margin-bottom: 1.8rem;
            padding-bottom: 0.65rem;
            color: #1f2933;
            font-size: clamp(1.55rem, 2.5vw, 2.05rem);
            font-weight: 750;
            letter-spacing: 0.015em;
        }

        section header h2::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 56px;
            height: 3px;
            border-radius: 99px;
            background: var(--accent);
        }

        .main-body {
            max-width: 920px;
            color: #262b33;
            font-size: 1.04rem;
            line-height: 1.95;
        }

        .main-body p,
        .main-body li {
            color: #2d333b;
        }

        .main-body p {
            margin-bottom: 1.05rem;
        }

        .main-body ul,
        .main-body ol {
            padding-left: 1.35rem;
            margin-bottom: 1.25rem;
        }

        .main-body li {
            margin-bottom: 0.45rem;
        }

        .main-body a {
            color: var(--accent);
            font-weight: 600;
            text-underline-offset: 0.18em;
        }

        .main-body a:hover {
            text-decoration: underline;
            opacity: 1;
        }

        .bg-gradient-primary-to-secondary-light {
            background: #fff;
        }

        .bg-gradient-primary-to-secondary-gray {
            background: linear-gradient(180deg, #f7f8fa 0%, #f1f3f5 100%);
        }

        footer.bg-bottom {
            background: #17212b;
        }

        #copyright-text {
            letter-spacing: 0.01em;
        }

        @media (max-width: 991.98px) {
            .top-section,
            .top-section-content {
                min-height: 620px;
            }

            .top-section-content .row {
                gap: 2rem;
            }

            .user-photo img {
                width: min(54%, 230px);
            }

            section {
                padding-top: 3.5rem;
                padding-bottom: 3.5rem;
            }
        }

        @media (max-width: 575.98px) {
            .container,
            .container.px-5 {
                padding-left: 1.35rem !important;
                padding-right: 1.35rem !important;
            }

            .top-section,
            .top-section-content {
                min-height: 560px;
            }

            #top-section-bg-text {
                text-align: left;
            }

            .user-photo img {
                width: min(62%, 200px);
                border-radius: 14px;
            }

            .main-body {
                font-size: 1rem;
                line-height: 1.9;
            }

            .nav-link {
                letter-spacing: 0.03em;
            }
        }
    </style>
</head>



<body id="page-top">
    <a class="visually-hidden-focusable" href="#home">Skip to main content</a>

    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav" aria-label="Primary navigation">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">

    <!-- Hero -->

            <div class="container px-1">
                <div class="row align-items-center">
                    <div class="col-lg-8">
                        <h1 id="top-section-bg-text" class="text-light display-3 lh-1 mb-4 font-alt">Jinxiang Yu</h1>
                    </div>
                    <div class="col-lg-4">
                        <div class="user-photo photo">
                            <img class="shadow" src="static/assets/img/photo.jpg" alt="Portrait of Jinxiang Yu" width="320" height="320" loading="eager" />

                    </div>
                </div>
            </div>
        </div>

    <main>
        <!-- Home -->
        <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="home" aria-labelledby="home-subtitle">
            <div class="container px-5">
                <header>
                    <h2 id="home-subtitle">About</h2>
                </header>
                <div class="main-body" id="home-md"></div>
            </div>
        </section>

        <!-- Research -->
        <section class="bg-gradient-primary-to-secondary-gray mt5 md5" id="publications" aria-labelledby="publications-subtitle">
            <div class="container px-5">
                <header>
                    <h2 id="publications-subtitle"><i class="bi bi-file-text-fill" aria-hidden="true"></i>&nbsp;Research</h2>
                </header>
                <div class="main-body" id="publications-md"></div>
            </div>
        </section>

        <!-- Teaching -->
        <section class="bg-gradient-primary-to-secondary-light mt5 md5" id="teaching" aria-labelledby="teaching-subtitle">
            <div class="container px-5">
                <header>
                    <h2 id="teaching-subtitle"><i class="bi bi-chat-left-text" aria-hidden="true"></i>&nbsp;Teaching</h2>
                </header>
                <div class="main-body" id="service-md"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <div id="copyright-text" class="mb-2"></div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script defer src="static/js/bootstrap.bundle.min.js"></script>
    <script defer src="static/js/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']] }
        };
    </script>
    <script defer id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="static/js/js-yaml.min.js"></script>
    <script defer src="static/js/scripts.js"></script>
</body>
